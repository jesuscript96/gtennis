services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gtenis
      POSTGRES_USER: gtenis
      POSTGRES_PASSWORD: gtenis
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DATABASE_URL: postgresql://gtenis:gtenis@db:5432/gtenis
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes: ["./backend:/app"]
    ports: ["8000:8000"]
    depends_on: [db, redis]

  worker:
    build: ./backend
    command: celery -A config worker -l info
    environment:
      DATABASE_URL: postgresql://gtenis:gtenis@db:5432/gtenis
      REDIS_URL: redis://redis:6379/0
    volumes: ["./backend:/app"]
    depends_on: [db, redis]

volumes:
  pgdata:
